version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: chat-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: chat_realtime
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: .
    container_name: chat-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: chat_realtime
      DB_USER: root
      DB_PASSWORD: 123456
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app

  frontend:
    build:
      context: ../FE
      dockerfile: Dockerfile
    container_name: chat-frontend
    restart: always
    ports:
      - "5174:80"
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mysql_data:

